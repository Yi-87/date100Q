<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <style id="theme-vars">
/* ============================================
   恋爱结婚100问 — Brand CSS
   Warm journal / love letter aesthetic
   ============================================ */

:root {
  /* ── Color System ── */
  --brand-primary: #c95f4a;
  --brand-primary-light: #e8a89a;
  --brand-primary-lighter: #f5d5cc;
  --brand-primary-dark: #a44535;

  --color-bg: #faf6f1;
  --color-bg-warm: #f3ece3;
  --color-bg-card: #fffcf8;
  --color-bg-inset: #f0e8dd;

  --color-ink: #2a221c;
  --color-ink-secondary: #5c4f44;
  --color-muted: #8c7e72;
  --color-faint: #b5a99e;

  --color-rule: #e4d9cc;
  --color-rule-strong: #cbbdaf;

  --state-success: #5b8a3a;
  --state-warning: #b07a2c;
  --state-error: #c95f4a;
  --state-info: #5a7fa0;

  /* ── Typography ── */
  --font-body: 'PingFang SC', -apple-system, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --font-display: 'PingFang SC', -apple-system, 'Noto Sans SC', sans-serif;

  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 15px;
  --text-lg: 17px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --text-4xl: 36px;

  --leading-tight: 1.3;
  --leading-normal: 1.6;
  --leading-relaxed: 1.8;

  --tracking-tight: -0.01em;
  --tracking-normal: 0em;
  --tracking-wide: 0.02em;

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Spacing Scale (4px base) ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ── Surface & Depth ── */
  --surface-border: 1px solid var(--color-rule);
  --surface-border-strong: 1px solid var(--color-rule-strong);
  --surface-shadow-static: 0 1px 3px rgba(42, 34, 28, 0.04);
  --surface-shadow-float: 0 8px 24px rgba(42, 34, 28, 0.08);
  --surface-shadow-modal: 0 16px 48px rgba(42, 34, 28, 0.12);

  /* ── CTA Style ── */
  --cta-bg: var(--brand-primary);
  --cta-text: #fff;
  --cta-radius: var(--radius-full);
  --cta-height: 44px;
  --cta-padding-x: 28px;
  --cta-font-size: var(--text-base);
  --cta-font-weight: 500;

  --surface-warm-bg: var(--color-bg-warm);
  --surface-warm-text: var(--color-ink-secondary);

  /* ── Transition ── */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;

  /* ── System Chrome ── */
  --color-chrome-bg: rgba(42, 34, 28, 0.06);
  --color-chrome-shadow: rgba(42, 34, 28, 0.1);
}

/* ── Global Body Defaults ── */
body {
  background: var(--color-bg);
  color: var(--color-ink);
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <div class="min-h-screen flex flex-col" style="background: var(--color-bg);">

    <!-- Status Bar + System Capsule -->
    <div class="flex-shrink-0 flex items-center justify-between px-5" style="height: 44px; background: var(--color-bg);">
      <div style="width: 60px;"></div>
      <span class="font-medium" style="font-size: var(--text-lg); color: var(--color-ink);">配对</span>
      <div class="w-[87px] h-8 flex items-center rounded-full" style="background: rgba(0,0,0,0.06);">
        <span class="flex-1 text-center" aria-label="更多">···</span>
        <span class="border-l inline-block" style="height: 16px;"></span>
        <span class="flex-1 text-center" aria-label="关闭">×</span>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-5 py-8">

      <!-- Connection Visual -->
      <div class="flex items-center justify-center" style="gap: 0; margin-bottom: 32px;">
        <div style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--brand-primary-lighter); color: var(--brand-primary);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/></svg>
        </div>
        <div style="width: 40px; height: 2px; background: var(--color-rule); position: relative;">
          <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: var(--brand-primary-light);"></div>
        </div>
        <div style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--color-bg-warm); color: var(--color-muted);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/></svg>
        </div>
      </div>

      <!-- Title -->
      <h2 style="font-size: var(--text-2xl); font-weight: 600; color: var(--color-ink); margin: 0 0 8px; text-align: center; letter-spacing: var(--tracking-tight);">
        连接彼此
      </h2>
      <p style="font-size: var(--text-sm); color: var(--color-muted); margin: 0 0 40px; text-align: center; line-height: var(--leading-normal);">
        和 TA 配对后，每天一起回答一个问题
      </p>

      <!-- Action Buttons -->
      <div class="w-full flex flex-col" style="gap: 14px; max-width: 320px;">
        <a href="#" class="flex items-center justify-center" style="width: 100%; height: var(--cta-height); border-radius: var(--radius-full); background: var(--cta-bg); color: var(--cta-text); font-size: var(--cta-font-size); font-weight: var(--cta-font-weight); text-decoration: none; gap: 8px;" data-dom-id="cta-pair-success">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          邀请 TA
        </a>
        <a href="#" class="flex items-center justify-center" style="width: 100%; height: var(--cta-height); border-radius: var(--radius-full); background: var(--surface-warm-bg); color: var(--surface-warm-text); font-size: var(--cta-font-size); font-weight: var(--cta-font-weight); border: 1px solid var(--color-rule); text-decoration: none; gap: 8px; cursor: pointer;" data-dom-id="cta-enter-code">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          我有邀请码
        </a>
      </div>

      <!-- Divider -->
      <div class="w-full flex items-center" style="max-width: 320px; margin-top: 40px; margin-bottom: 20px; gap: 12px;">
        <div class="flex-1" style="height: 1px; background: var(--color-rule);"></div>
      </div>

      <!-- Test mode -->
      <span style="color: var(--color-faint); font-size: var(--text-xs); cursor: pointer; padding: 4px 12px;">
        测试模式：独自配对
      </span>

    </main>

    <!-- Tab Bar -->
    <nav class="flex-shrink-0" style="background: var(--color-bg-card); border-top: 1px solid var(--color-rule);">
      <div class="flex items-center justify-around" style="height: 50px; padding-bottom: 8px;">
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--color-muted); text-decoration: none;" data-nav-key="index" data-dom-id="nav-home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          <span style="font-size: 10px; line-height: 1;">首页</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--color-muted); text-decoration: none;" data-nav-key="history" data-dom-id="nav-history">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
          <span style="font-size: 10px; line-height: 1;">历史</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--color-muted); text-decoration: none;" data-nav-key="profile" data-dom-id="nav-profile">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span style="font-size: 10px; line-height: 1;">我的</span>
        </a>
      </div>
    </nav>

  </div>
</body>
</html>
