<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <style id="theme-vars">
/* ============================================
   恋爱结婚100问 — Brand CSS
   Warm journal / love letter aesthetic
   ============================================ */

:root {
  /* ── Color System ── */
  --brand-primary: #c95f4a;
  --brand-primary-light: #e8a89a;
  --brand-primary-lighter: #f5d5cc;
  --brand-primary-dark: #a44535;

  --color-bg: #faf6f1;
  --color-bg-warm: #f3ece3;
  --color-bg-card: #fffcf8;
  --color-bg-inset: #f0e8dd;

  --color-ink: #2a221c;
  --color-ink-secondary: #5c4f44;
  --color-muted: #8c7e72;
  --color-faint: #b5a99e;

  --color-rule: #e4d9cc;
  --color-rule-strong: #cbbdaf;

  --state-success: #5b8a3a;
  --state-warning: #b07a2c;
  --state-error: #c95f4a;
  --state-info: #5a7fa0;

  /* ── Typography ── */
  --font-body: 'PingFang SC', -apple-system, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --font-display: 'PingFang SC', -apple-system, 'Noto Sans SC', sans-serif;

  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 15px;
  --text-lg: 17px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --text-4xl: 36px;

  --leading-tight: 1.3;
  --leading-normal: 1.6;
  --leading-relaxed: 1.8;

  --tracking-tight: -0.01em;
  --tracking-normal: 0em;
  --tracking-wide: 0.02em;

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ── Spacing Scale (4px base) ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ── Surface & Depth ── */
  --surface-border: 1px solid var(--color-rule);
  --surface-border-strong: 1px solid var(--color-rule-strong);
  --surface-shadow-static: 0 1px 3px rgba(42, 34, 28, 0.04);
  --surface-shadow-float: 0 8px 24px rgba(42, 34, 28, 0.08);
  --surface-shadow-modal: 0 16px 48px rgba(42, 34, 28, 0.12);

  /* ── CTA Style ── */
  --cta-bg: var(--brand-primary);
  --cta-text: #fff;
  --cta-radius: var(--radius-full);
  --cta-height: 44px;
  --cta-padding-x: 28px;
  --cta-font-size: var(--text-base);
  --cta-font-weight: 500;

  --surface-warm-bg: var(--color-bg-warm);
  --surface-warm-text: var(--color-ink-secondary);

  /* ── Transition ── */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;

  /* ── System Chrome ── */
  --color-chrome-bg: rgba(42, 34, 28, 0.06);
  --color-chrome-shadow: rgba(42, 34, 28, 0.1);
}

/* ── Global Body Defaults ── */
body {
  background: var(--color-bg);
  color: var(--color-ink);
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  letter-spacing: var(--tracking-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <div class="min-h-screen flex flex-col" style="background: var(--color-bg);">

    <!-- Status Bar + System Capsule -->
    <div class="flex-shrink-0 flex items-center justify-between px-5" style="height: 44px; background: var(--color-bg);">
      <div style="width: 60px;"></div>
      <span class="font-medium" style="font-size: var(--text-lg); color: var(--color-ink);">历史记录</span>
      <div class="w-[87px] h-8 flex items-center rounded-full" style="background: rgba(0,0,0,0.06);">
        <span class="flex-1 text-center" aria-label="更多">···</span>
        <span class="border-l inline-block" style="height: 16px;"></span>
        <span class="flex-1 text-center" aria-label="关闭">×</span>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 px-5 py-6">

      <!-- Stats Bar -->
      <div class="flex items-center justify-between" style="margin-bottom: 24px; padding: 0 4px;">
        <span style="font-size: var(--text-sm); color: var(--color-muted);">已解锁 <strong style="color: var(--brand-primary);">5</strong> 个问题</span>
        <span style="font-size: var(--text-xs); color: var(--color-faint);">共回答 10 次</span>
      </div>

      <!-- Month Group -->
      <div style="margin-bottom: 24px;">
        <div style="font-size: var(--text-sm); font-weight: 600; color: var(--color-muted); margin-bottom: 12px; padding-left: 4px; letter-spacing: var(--tracking-wide);">2026年7月</div>

        <!-- Card 1 -->
        <div style="background: var(--color-bg-card); border: 1px solid var(--color-rule); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;">
          <p style="font-size: var(--text-base); font-weight: 600; color: var(--color-ink); margin-bottom: 16px; line-height: var(--leading-tight);">你最想和 TA 一起完成的一件事是什么？</p>
          <div class="flex" style="gap: 8px; margin-bottom: 10px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--brand-primary-lighter); color: var(--brand-primary-dark);">我</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--brand-primary-dark); padding-top: 4px; margin: 0;">一起去看极光，在冰岛的小木屋里，外面是漫天的绿光，屋里是暖黄的灯光。</p>
          </div>
          <div style="height: 1px; background: var(--color-rule); margin: 12px 0;"></div>
          <div class="flex" style="gap: 8px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--color-bg-warm); color: var(--color-ink-secondary);">TA</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--color-ink-secondary); padding-top: 4px; margin: 0;">想和你一起养一只猫，每天下班回家它会在门口等我们。</p>
          </div>
        </div>

        <!-- Card 2 -->
        <div style="background: var(--color-bg-card); border: 1px solid var(--color-rule); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;">
          <p style="font-size: var(--text-base); font-weight: 600; color: var(--color-ink); margin-bottom: 16px; line-height: var(--leading-tight);">你觉得自己在恋爱中最大的缺点是什么？</p>
          <div class="flex" style="gap: 8px; margin-bottom: 10px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--brand-primary-lighter); color: var(--brand-primary-dark);">我</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--brand-primary-dark); padding-top: 4px; margin: 0;">有时候太在意细节，容易钻牛角尖，忘了看大局。</p>
          </div>
          <div style="height: 1px; background: var(--color-rule); margin: 12px 0;"></div>
          <div class="flex" style="gap: 8px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--color-bg-warm); color: var(--color-ink-secondary);">TA</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--color-ink-secondary); padding-top: 4px; margin: 0;">不太会表达情绪，心里想的多但说出来的少。</p>
          </div>
        </div>

        <!-- Card 3 -->
        <div style="background: var(--color-bg-card); border: 1px solid var(--color-rule); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;">
          <p style="font-size: var(--text-base); font-weight: 600; color: var(--color-ink); margin-bottom: 16px; line-height: var(--leading-tight);">第一次见到 TA 时，你的第一印象是什么？</p>
          <div class="flex" style="gap: 8px; margin-bottom: 10px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--brand-primary-lighter); color: var(--brand-primary-dark);">我</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--brand-primary-dark); padding-top: 4px; margin: 0;">笑起来很好看，声音很温柔，感觉是个很温暖的人。</p>
          </div>
          <div style="height: 1px; background: var(--color-rule); margin: 12px 0;"></div>
          <div class="flex" style="gap: 8px;">
            <div style="flex-shrink: 0; width: 28px; height: 28px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; background: var(--color-bg-warm); color: var(--color-ink-secondary);">TA</div>
            <p style="font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--color-ink-secondary); padding-top: 4px; margin: 0;">比照片好看，而且说话很有意思，不尴尬。</p>
          </div>
        </div>
      </div>

    </main>

    <!-- Tab Bar -->
    <nav class="flex-shrink-0" style="background: var(--color-bg-card); border-top: 1px solid var(--color-rule);">
      <div class="flex items-center justify-around" style="height: 50px; padding-bottom: 8px;">
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--color-muted); text-decoration: none;" data-nav-key="index" data-dom-id="nav-home">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          <span style="font-size: 10px; line-height: 1;">首页</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--brand-primary); text-decoration: none; font-weight: 600;" data-nav-key="history" data-dom-id="nav-history">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
          <span style="font-size: 10px; line-height: 1;">历史</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center flex-1" style="gap: 2px; color: var(--color-muted); text-decoration: none;" data-nav-key="profile" data-dom-id="nav-profile">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span style="font-size: 10px; line-height: 1;">我的</span>
        </a>
      </div>
    </nav>

  </div>
</body>
</html>
